<!DOCTYPE html>
<html>
<head>
  <title>Simple DApp</title>
</head>
<body>

  <h2>區塊鏈互動網頁</h2>

  <button onclick="connectWallet()">連接錢包</button>
  <p id="account"></p>

  <hr>

  <input type="number" id="inputValue" placeholder="輸入數字">
  <button onclick="setValue()">寫入區塊鏈</button>

  <button onclick="getValue()">讀取區塊鏈</button>
  <p id="result"></p>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

  <script>
    let provider;
    let signer;
    let contract;

    const contractAddress = "你的合約地址";

    const abi = [
      "function setValue(uint256 _value)",
      "function getValue() view returns (uint256)"
    ];

    async function connectWallet() {
      if (window.ethereum) {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();

        const address = await signer.getAddress();
        document.getElementById("account").innerText = "帳號: " + address;

        contract = new ethers.Contract(contractAddress, abi, signer);
      } else {
        alert("請安裝 MetaMask");
      }
    }

    async function setValue() {
      const value = document.getElementById("inputValue").value;
      const tx = await contract.setValue(value);
      await tx.wait();
      alert("寫入成功！");
    }

    async function getValue() {
      const result = await contract.getValue();
      document.getElementById("result").innerText = "目前數值: " + result;
    }
  </script>

</body>
</html>
